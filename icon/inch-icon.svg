<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1024" height="1024" fill="#0D3B2E"/>

  <!-- Three progressively taller bars, centred, equal width and spacing -->
  <!-- Bar widths: 120px each, gaps: 64px, total cluster: 3*120 + 2*64 = 488px -->
  <!-- Left bar:   x=268, height=460 (45%), bottom-anchored -->
  <!-- Centre bar: x=452, height=614 (60%), bottom-anchored -->
  <!-- Right bar:  x=636, height=768 (75%), bottom-anchored -->
  <!-- All bars bottom at y=832, rounded top caps only -->

  <rect x="268" y="372" width="120" height="460" rx="24" ry="24" fill="#E8F5E0"/>
  <rect x="452" y="218" width="120" height="614" rx="24" ry="24" fill="#E8F5E0"/>
  <rect x="636" y="64"  width="120" height="768" rx="24" ry="24" fill="#E8F5E0"/>
</svg>

included:
  - inch
  - Shared

excluded:
  - inch/inch.xcodeproj
  - Shared/.build

disabled_rules:
  - type_name              # widget + watch app targets use lowercase-prefixed names by convention
  - function_parameter_count
  - type_body_length
  - file_length
  - trailing_whitespace
  - identifier_name        # CodingKeys enums use snake_case for JSON field names (intentional)

opt_in_rules:
  - implicit_return

identifier_name:
  min_length: 1            # allow single-letter sensor axes (ax, ay, az, gx, gy, gz) and loop vars
  max_length: 60
  excluded:
    - id
    - i
    - x
    - y
    - z

line_length:
  warning: 120
  error: 250              # SwiftUI Text() strings and long string literals can't be meaningfully split
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 100
  error: 150

cyclomatic_complexity:
  warning: 10
  error: 25              # encode(_:) functions with many associated values legitimately exceed 10

force_cast: warning

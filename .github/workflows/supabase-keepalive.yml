name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 0 * * 1'  # Monday midnight UTC
    - cron: '0 0 * * 4'  # Thursday midnight UTC
  workflow_dispatch:       # manual trigger if needed

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            'https://xwvlewuuavpgurmtenwk.supabase.co/rest/v1/sensor_recordings?select=id&limit=1' \
            -H "apikey: $ANON_KEY" \
            -H "Authorization: Bearer $ANON_KEY")
          echo "Response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Unexpected status $STATUS"
            exit 1
          fi

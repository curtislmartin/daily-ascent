name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shared-package:
    name: Shared package (swift test)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app
      - name: Swift version
        run: swift --version
      - name: Run tests
        working-directory: Shared
        run: swift test --parallel

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shared-package:
    name: Shared package (swift test)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Swift version
        run: swift --version
      - name: Run tests
        working-directory: Shared
        run: swift test --parallel

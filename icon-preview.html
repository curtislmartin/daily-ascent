<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Ascent Icon Concepts</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #ccc; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif; padding: 40px; }
  h1 { font-size: 24px; font-weight: 300; margin-bottom: 8px; color: #fff; letter-spacing: 0.5px; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 40px; }
  .grid { display: flex; gap: 48px; flex-wrap: wrap; justify-content: center; }
  .concept { text-align: center; }
  .concept h2 { font-size: 14px; font-weight: 500; color: #aaa; margin-bottom: 12px; letter-spacing: 1px; text-transform: uppercase; }
  .concept p { font-size: 12px; color: #555; margin-top: 10px; max-width: 240px; }
  .sizes { display: flex; gap: 16px; align-items: flex-end; margin-top: 16px; justify-content: center; }
  .sizes canvas { border-radius: 12%; }
  .size-label { font-size: 10px; color: #444; margin-top: 4px; text-align: center; }
  canvas.main { border-radius: 22.34%; }
  hr { border: none; border-top: 1px solid #222; margin: 48px 0; }
</style>
</head>
<body>
<h1>Daily Ascent — Icon Concepts</h1>
<p class="subtitle">Preview at app icon size (240px) and watchOS sizes. Click to download any as PNG.</p>

<div class="grid" id="grid"></div>

<script>
// ─── Shared utilities ───
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo = 0, hi = 255) { return Math.max(lo, Math.min(hi, Math.round(v))); }

function drawRoundedRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawBackground(ctx, size) {
  // Deep charcoal-obsidian gradient
  const grd = ctx.createRadialGradient(size*0.5, size*0.4, 0, size*0.5, size*0.5, size*0.7);
  grd.addColorStop(0, '#222226');
  grd.addColorStop(1, '#101014');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, size, size);
}

// ─── Concept A: Cylindrical Helix (uniform width, not conical) ───
function drawConceptA(canvas, size) {
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  drawBackground(ctx, size);

  const cx = size * 0.50, cy = size * 0.46;
  const numTurns = 2.4, pts = 2000;
  const height = size * 0.56;
  const radius = size * 0.18; // uniform radius — cylindrical

  const tiltX = 18 * Math.PI / 180;
  const cosTx = Math.cos(tiltX), sinTx = Math.sin(tiltX);

  // Generate points
  const points = [];
  for (let i = 0; i < pts; i++) {
    const t = i / (pts - 1);
    const angle = t * numTurns * 2 * Math.PI - Math.PI * 0.6;
    const r = lerp(radius, radius * 0.25, t * t); // slight taper, not conical

    const x3d = r * Math.cos(angle);
    const z3d = r * Math.sin(angle);
    const y3d = -height * t + height * 0.40;

    const yRot = y3d * cosTx - z3d * sinTx;
    const zRot = y3d * sinTx + z3d * cosTx;
    const ps = 1.0 + zRot * 0.0003;

    points.push({
      x: cx + x3d * ps, y: cy + yRot * ps, z: zRot, t,
      nx: Math.cos(angle), nz: Math.sin(angle) * cosTx,
      hw: lerp(size * 0.018, size * 0.005, t * t)
    });
  }

  // Sort by depth, draw back-to-front
  const segs = [];
  for (let i = 0; i < points.length - 1; i++) {
    segs.push({ i, z: (points[i].z + points[i+1].z) / 2 });
  }
  segs.sort((a, b) => a.z - b.z);

  for (const seg of segs) {
    const p1 = points[seg.i], p2 = points[seg.i + 1];
    const nx = (p1.nx + p2.nx) / 2, nz = (p1.nz + p2.nz) / 2;
    const t = (p1.t + p2.t) / 2;

    // Lighting
    const d1 = Math.max(0, nx * 0.42 + nz * 0.72);
    const d2 = Math.max(0, nx * -0.5 + nz * 0.3) * 0.2;
    const diff = Math.min(1, d1 + d2);
    const spec = Math.pow(Math.max(0, d1), 20) * 0.7;

    const intensity = 0.10 + diff * 0.78;
    const cr = clamp(lerp(50, 178, intensity) + spec * 220);
    const cg = clamp(lerp(53, 182, intensity) + spec * 215);
    const cb = clamp(lerp(60, 196, intensity) + spec * 235);

    ctx.strokeStyle = `rgb(${cr},${cg},${cb})`;
    ctx.lineWidth = p1.hw * 2;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
  }

  // Tip glow
  const tip = points[points.length - 1];
  const tg = ctx.createRadialGradient(tip.x, tip.y, 0, tip.x, tip.y, size * 0.03);
  tg.addColorStop(0, 'rgba(220,220,230,0.7)');
  tg.addColorStop(1, 'rgba(220,220,230,0)');
  ctx.fillStyle = tg;
  ctx.fillRect(tip.x - size*0.05, tip.y - size*0.05, size*0.1, size*0.1);
}

// ─── Concept B: Abstract Mountain Peak ───
function drawConceptB(canvas, size) {
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  drawBackground(ctx, size);

  const cx = size * 0.5, cy = size * 0.5;

  // Single elegant chevron/peak
  const peakX = cx, peakY = size * 0.22;
  const leftX = size * 0.18, leftY = size * 0.78;
  const rightX = size * 0.82, rightY = size * 0.78;

  // Metallic gradient for the peak
  const grad = ctx.createLinearGradient(leftX, leftY, rightX, peakY);
  grad.addColorStop(0, '#5a5a64');
  grad.addColorStop(0.3, '#8a8a96');
  grad.addColorStop(0.5, '#b8b8c4');
  grad.addColorStop(0.7, '#9a9aa6');
  grad.addColorStop(1, '#6a6a74');

  // Draw peak shape with slight curve
  ctx.beginPath();
  ctx.moveTo(leftX, leftY);
  ctx.quadraticCurveTo(size * 0.35, size * 0.45, peakX, peakY);
  ctx.quadraticCurveTo(size * 0.65, size * 0.45, rightX, rightY);
  ctx.strokeStyle = grad;
  ctx.lineWidth = size * 0.028;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Second smaller peak behind (depth)
  ctx.beginPath();
  ctx.moveTo(size * 0.35, size * 0.72);
  ctx.quadraticCurveTo(size * 0.52, size * 0.40, size * 0.58, size * 0.34);
  ctx.strokeStyle = '#404048';
  ctx.lineWidth = size * 0.015;
  ctx.stroke();

  // Tip highlight
  const tg = ctx.createRadialGradient(peakX, peakY, 0, peakX, peakY, size * 0.04);
  tg.addColorStop(0, 'rgba(230,230,240,0.6)');
  tg.addColorStop(1, 'rgba(230,230,240,0)');
  ctx.fillStyle = tg;
  ctx.beginPath();
  ctx.arc(peakX, peakY, size * 0.04, 0, Math.PI * 2);
  ctx.fill();
}

// ─── Concept C: Rising Arc / Crescendo ───
function drawConceptC(canvas, size) {
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  drawBackground(ctx, size);

  // Single sweeping arc from bottom-left to upper-right
  const pts = 500;
  for (let i = 0; i < pts - 1; i++) {
    const t1 = i / (pts - 1);
    const t2 = (i + 1) / (pts - 1);

    // Cubic bezier-like curve
    const x1 = lerp(size * 0.14, size * 0.82, t1);
    const y1 = lerp(size * 0.78, size * 0.20, Math.pow(t1, 0.6));
    const x2 = lerp(size * 0.14, size * 0.82, t2);
    const y2 = lerp(size * 0.78, size * 0.20, Math.pow(t2, 0.6));

    // Add gentle S-curve
    const curveAmt = Math.sin(t1 * Math.PI) * size * 0.08;
    const cy1 = y1 - curveAmt;
    const cy2 = y2 - curveAmt;

    // Width tapers
    const w = lerp(size * 0.04, size * 0.006, Math.pow(t1, 0.5));

    // Metallic shading based on curve direction
    const angle = Math.atan2(cy2 - cy1, x2 - x1);
    const lightDot = Math.cos(angle - 0.5) * 0.5 + 0.5;
    const spec = Math.pow(lightDot, 12) * 0.6;

    const intensity = 0.15 + lightDot * 0.7;
    const cr = clamp(lerp(50, 180, intensity) + spec * 200);
    const cg = clamp(lerp(53, 184, intensity) + spec * 195);
    const cb = clamp(lerp(62, 200, intensity) + spec * 210);

    ctx.strokeStyle = `rgb(${cr},${cg},${cb})`;
    ctx.lineWidth = w;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x1, cy1);
    ctx.lineTo(x2, cy2);
    ctx.stroke();
  }

  // Tip glow at end
  const tipX = size * 0.82, tipY = size * 0.20;
  const tg = ctx.createRadialGradient(tipX, tipY, 0, tipX, tipY, size * 0.03);
  tg.addColorStop(0, 'rgba(220,222,235,0.7)');
  tg.addColorStop(1, 'rgba(220,222,235,0)');
  ctx.fillStyle = tg;
  ctx.fillRect(tipX - size*0.05, tipY - size*0.05, size*0.1, size*0.1);
}

// ─── Concept D: Refined Conical Helix (original, but better proportions) ───
function drawConceptD(canvas, size) {
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  drawBackground(ctx, size);

  const cx = size * 0.50, cy = size * 0.46;
  const numTurns = 2.0, pts = 2000; // fewer turns = less tree-like
  const height = size * 0.52;
  const baseR = size * 0.20, topR = size * 0.06; // less extreme taper

  const tiltX = 20 * Math.PI / 180;
  const cosTx = Math.cos(tiltX), sinTx = Math.sin(tiltX);

  const points = [];
  for (let i = 0; i < pts; i++) {
    const t = i / (pts - 1);
    const angle = t * numTurns * 2 * Math.PI - Math.PI * 0.5;
    const r = lerp(baseR, topR, Math.pow(t, 0.9));

    const x3d = r * Math.cos(angle);
    const z3d = r * Math.sin(angle);
    const y3d = -height * t + height * 0.38;

    const yRot = y3d * cosTx - z3d * sinTx;
    const zRot = y3d * sinTx + z3d * cosTx;
    const ps = 1.0 + zRot * 0.0003;

    points.push({
      x: cx + x3d * ps, y: cy + yRot * ps, z: zRot, t,
      nx: Math.cos(angle), nz: Math.sin(angle) * cosTx,
      hw: lerp(size * 0.016, size * 0.004, Math.pow(t, 0.7))
    });
  }

  const segs = [];
  for (let i = 0; i < points.length - 1; i++) {
    segs.push({ i, z: (points[i].z + points[i+1].z) / 2 });
  }
  segs.sort((a, b) => a.z - b.z);

  for (const seg of segs) {
    const p1 = points[seg.i], p2 = points[seg.i + 1];
    const nx = (p1.nx + p2.nx) / 2, nz = (p1.nz + p2.nz) / 2;

    const d1 = Math.max(0, nx * 0.42 + nz * 0.72);
    const d2 = Math.max(0, nx * -0.5 + nz * 0.3) * 0.2;
    const diff = Math.min(1, d1 + d2);
    const spec = Math.pow(Math.max(0, d1), 20) * 0.7;

    const intensity = 0.10 + diff * 0.78;
    const cr = clamp(lerp(50, 178, intensity) + spec * 220);
    const cg = clamp(lerp(53, 182, intensity) + spec * 215);
    const cb = clamp(lerp(60, 196, intensity) + spec * 235);

    // Back segments dimmer for depth
    const depthDim = seg.z < 0 ? 0.5 : 1.0;

    ctx.strokeStyle = `rgb(${clamp(cr * depthDim)},${clamp(cg * depthDim)},${clamp(cb * depthDim)})`;
    ctx.lineWidth = p1.hw * 2;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
  }

  const tip = points[points.length - 1];
  const tg = ctx.createRadialGradient(tip.x, tip.y, 0, tip.x, tip.y, size * 0.025);
  tg.addColorStop(0, 'rgba(225,225,235,0.8)');
  tg.addColorStop(1, 'rgba(225,225,235,0)');
  ctx.fillStyle = tg;
  ctx.fillRect(tip.x - size*0.04, tip.y - size*0.04, size*0.08, size*0.08);
}

// ─── Render all concepts ───
const concepts = [
  { name: 'A — Cylindrical Helix', desc: 'Uniform-width rising spiral. Elegant, no tree shape.', draw: drawConceptA },
  { name: 'B — Mountain Peak', desc: 'Abstract chevron/peak. Bold, reads at any size.', draw: drawConceptB },
  { name: 'C — Rising Arc', desc: 'Single sweeping crescendo. Minimal, unmistakable.', draw: drawConceptC },
  { name: 'D — Refined Conical', desc: 'Original helix, fewer turns, better depth contrast.', draw: drawConceptD },
];

const grid = document.getElementById('grid');
concepts.forEach(c => {
  const div = document.createElement('div');
  div.className = 'concept';

  const h2 = document.createElement('h2');
  h2.textContent = c.name;
  div.appendChild(h2);

  // Main 240px preview
  const mainCanvas = document.createElement('canvas');
  mainCanvas.className = 'main';
  mainCanvas.style.width = '240px';
  mainCanvas.style.height = '240px';
  mainCanvas.style.cursor = 'pointer';
  mainCanvas.title = 'Click to download 1024px PNG';
  c.draw(mainCanvas, 480); // 2x for retina
  mainCanvas.addEventListener('click', () => {
    const big = document.createElement('canvas');
    c.draw(big, 1024);
    const link = document.createElement('a');
    link.download = c.name.replace(/[^a-zA-Z0-9]/g, '_') + '_1024.png';
    link.href = big.toDataURL('image/png');
    link.click();
  });
  div.appendChild(mainCanvas);

  const p = document.createElement('p');
  p.textContent = c.desc;
  div.appendChild(p);

  // Small sizes
  const sizesDiv = document.createElement('div');
  sizesDiv.className = 'sizes';
  [44, 33, 22].forEach(s => {
    const wrapper = document.createElement('div');
    const sm = document.createElement('canvas');
    sm.style.width = s + 'px';
    sm.style.height = s + 'px';
    c.draw(sm, s * 2);
    wrapper.appendChild(sm);
    const label = document.createElement('div');
    label.className = 'size-label';
    label.textContent = s + 'px';
    wrapper.appendChild(label);
    sizesDiv.appendChild(wrapper);
  });
  div.appendChild(sizesDiv);

  grid.appendChild(div);
});
</script>
</body>
</html>
